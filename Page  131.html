<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical Terms</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>

<div class="container"></div>

<script>
const parts = [

{
text:"Bolt",
phonetic:"/boʊlt/",
cn:"螺栓",
desc:"用于连接零件的紧固件",
words:[
{ w:"Bolt", cn:"螺栓", phonetic:"/boʊlt/" }
]
},

{
text:"Washer",
phonetic:"/ˈwɑːʃər/",
cn:"垫圈",
desc:"用于分散螺栓压力的零件",
words:[
{ w:"Washer", cn:"垫圈", phonetic:"/ˈwɑːʃər/" }
]
},

{
text:"Nut",
phonetic:"/nʌt/",
cn:"螺母",
desc:"与螺栓配合使用的紧固件",
words:[
{ w:"Nut", cn:"螺母", phonetic:"/nʌt/" }
]
},

{
text:"Shaft",
phonetic:"/ʃæft/",
cn:"轴",
desc:"用于传递旋转运动的圆柱零件",
words:[
{ w:"Shaft", cn:"轴", phonetic:"/ʃæft/" }
]
},

{
text:"Keeper Pin",
phonetic:"/ˈkiːpər pɪn/",
cn:"销轴",
desc:"用于固定或限位的销类零件",
words:[
{ w:"Keeper", cn:"保持器", phonetic:"/ˈkiːpər/" },
{ w:"Pin", cn:"销", phonetic:"/pɪn/" }
]
},

{
text:"Front Right Steering Yoke",
phonetic:"/frʌnt raɪt ˈstɪrɪŋ joʊk/",
cn:"右前转向节",
desc:"车辆右前轮转向执行结构",
words:[
{ w:"Front", cn:"前", phonetic:"/frʌnt/" },
{ w:"Right", cn:"右", phonetic:"/raɪt/" },
{ w:"Steering", cn:"转向", phonetic:"/ˈstɪrɪŋ/" },
{ w:"Yoke", cn:"转向节", phonetic:"/joʊk/" }
]
},

{
text:"Kinpin Pivot Bolt",
phonetic:"/ˈkɪnpɪn ˈpɪvət boʊlt/",
cn:"主销活节螺栓",
desc:"用于主销旋转连接的螺栓",
words:[
{ w:"Kinpin", cn:"主销", phonetic:"/ˈkɪnpɪn/" },
{ w:"Pivot", cn:"枢轴", phonetic:"/ˈpɪvət/" },
{ w:"Bolt", cn:"螺栓", phonetic:"/boʊlt/" }
]
}

];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');

  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        ${p.phonetic ? `<span class="phonetic">${p.phonetic}</span>` : ""}
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;

    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>

</body>
</html>
