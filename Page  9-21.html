<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Hose & Pump Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Hose Assembly",
phonetic:"/hoʊz əˈsɛmbli/",
cn:"胶管总成",
desc:"由软管与接头组成的液压连接组件",
words:[
{ w:"Hose", cn:"胶管", phonetic:"/hoʊz/" },
{ w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/" }
]
},

{
text:"End Straight Fitting",
phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
cn:"端直通接头",
desc:"用于管路端部直线连接的接头",
words:[
{ w:"End", cn:"端部", phonetic:"/ɛnd/" },
{ w:"Straight", cn:"直通", phonetic:"/streɪt/" },
{ w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/" }
]
},

{
text:"Hose",
phonetic:"/hoʊz/",
cn:"胶管",
desc:"用于输送液压油的柔性管路"
},

{
text:"90° Union Fitting",
phonetic:"/ˈnaɪnti dɪˈɡriː ˈjuːniən ˈfɪtɪŋ/",
cn:"直角组合接头",
desc:"用于90度转向连接的管路接头",
words:[
{ w:"90°", cn:"直角", phonetic:"/ˈnaɪnti dɪˈɡriː/" },
{ w:"Union", cn:"组合", phonetic:"/ˈjuːniən/" },
{ w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/" }
]
},

{
text:"Manual Hydraulic Pump",
phonetic:"/ˈmænjuəl haɪˈdrɔːlɪk pʌmp/",
cn:"手动液压泵",
desc:"通过手动操作产生液压压力的泵",
words:[
{ w:"Manual", cn:"手动", phonetic:"/ˈmænjuəl/" },
{ w:"Hydraulic", cn:"液压", phonetic:"/haɪˈdrɔːlɪk/" },
{ w:"Pump", cn:"泵", phonetic:"/pʌmp/" }
]
},

{
text:"UNC/UNF Bolt",
phonetic:"/ˌjuː ɛn ˈsiː / ˌjuː ɛn ˈɛf boʊlt/",
cn:"美制螺栓",
desc:"采用UNC或UNF螺纹标准的螺栓",
words:[
{ w:"UNC/UNF", cn:"美制螺纹标准", phonetic:"/ˌjuː ɛn ˈsiː / ˌjuː ɛn ˈɛf/" },
{ w:"Bolt", cn:"螺栓", phonetic:"/boʊlt/" }
]
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
