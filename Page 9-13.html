<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Core Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Articulated Joint",
phonetic:"/ɑːrˈtɪkjəleɪtɪd dʒɔɪnt/",
cn:"铰接式接头",
desc:"用于允许多方向转动的连接接头",
words:[
{ w:"Articulated", cn:"铰接式", phonetic:"/ɑːrˈtɪkjəleɪtɪd/" },
{ w:"Joint", cn:"接头", phonetic:"/dʒɔɪnt/" }
]
},

{
text:"Hydraulic Oil Tank",
phonetic:"/haɪˈdrɔːlɪk ɔɪl tæŋk/",
cn:"液压油箱",
desc:"用于储存液压油的容器",
words:[
{ w:"Hydraulic", cn:"液压", phonetic:"/haɪˈdrɔːlɪk/" },
{ w:"Oil", cn:"油", phonetic:"/ɔɪl/" },
{ w:"Tank", cn:"箱", phonetic:"/tæŋk/" }
]
},

{
text:"Washer",
phonetic:"/ˈwɑːʃər/",
cn:"垫圈",
desc:"用于分散载荷或防松"
},

{
text:"Bolt",
phonetic:"/boʊlt/",
cn:"螺栓",
desc:"标准紧固件"
},

{
text:"90° Union Fitting",
phonetic:"/ˈnaɪnti dɪˈɡriː ˈjuːniən ˈfɪtɪŋ/",
cn:"直角组合接头",
desc:"用于90度转向连接的管路接头",
words:[
{ w:"90°", cn:"90度", phonetic:"/ˈnaɪnti dɪˈɡriː/" },
{ w:"Union", cn:"组合", phonetic:"/ˈjuːniən/" },
{ w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/" }
]
},

{
text:"Hose Assembly",
phonetic:"/hoʊz əˈsɛmbli/",
cn:"胶管总成",
desc:"由软管及接头组成的组件",
words:[
{ w:"Hose", cn:"软管", phonetic:"/hoʊz/" },
{ w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/" }
]
},

{
text:"End Straight Fitting",
phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
cn:"端直通接头",
desc:"用于端部直通连接",
words:[
{ w:"End", cn:"端部", phonetic:"/ɛnd/" },
{ w:"Straight", cn:"直通", phonetic:"/streɪt/" },
{ w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/" }
]
},

{
text:"Spool Valve",
phonetic:"/spuːl vælv/",
cn:"滑阀分装",
desc:"通过阀芯滑动控制流体方向的阀",
words:[
{ w:"Spool", cn:"滑阀芯", phonetic:"/spuːl/" },
{ w:"Valve", cn:"阀", phonetic:"/vælv/" }
]
},

{
text:"External Gear Pump",
phonetic:"/ɪkˈstɜːrnəl ɡɪr pʌmp/",
cn:"外啮合齿轮泵",
desc:"利用齿轮啮合输送液压油的泵",
words:[
{ w:"External", cn:"外部", phonetic:"/ɪkˈstɜːrnəl/" },
{ w:"Gear", cn:"齿轮", phonetic:"/ɡɪr/" },
{ w:"Pump", cn:"泵", phonetic:"/pʌmp/" }
]
},

{
text:"UNC/UNF Bolt",
phonetic:"/ˌjuː ɛn ˈsiː / ˌjuː ɛn ˈɛf boʊlt/",
cn:"美制螺栓",
desc:"采用UNC或UNF螺纹标准的螺栓",
words:[
{ w:"UNC/UNF", cn:"美制粗牙/细牙", phonetic:"/ˌjuː ɛn ˈsiː / ˌjuː ɛn ˈɛf/" },
{ w:"Bolt", cn:"螺栓", phonetic:"/boʊlt/" }
]
},

{
text:"Spring Washer",
phonetic:"/sprɪŋ ˈwɑːʃər/",
cn:"弹簧垫圈",
desc:"用于防松的弹性垫圈",
words:[
{ w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/" },
{ w:"Washer", cn:"垫圈", phonetic:"/ˈwɑːʃər/" }
]
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
