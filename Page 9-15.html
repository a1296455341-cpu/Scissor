<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Tank & Filtration System</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

{

},

{
text:"Hydraulic Tank Cap",

cn:"油箱盖",
desc:"用于封闭油箱并防止污染",

{
text:"Pneumatic Fitting",
phonetic:"/nuːˈmætɪk ˈfɪtɪŋ/",
cn:"气动组合接头",
desc:"用于气动系统连接的接头",

{

phonetic:"/ˈkɑːmpaʊnd ˈɡæskɪt/",
cn:"组合垫圈",

]
},

{

phonetic:"/rɪˈtɜːrn ˈfɪltər kæp/",
cn:"回油滤油器盖",
desc:"回油过滤器的封盖",
words:[

]
},

{

},

cn:"滤芯",

words:[

{ w:"Element", cn:"元件", phonetic:"/ˈɛləmənt/" }

},

{

phonetic:"/ˈfɪltər ˈkɑːrtrɪdʒ/",

]
},

{
text:"Bypass Valve",
phonetic:"/ˈbaɪpæs vælv/",
cn:"旁通阀",
desc:"当过滤器堵塞时旁通油路",
words:[
{ w:"Bypass", cn:"旁通", phonetic:"/ˈbaɪpæs/" },
{ w:"Valve", cn:"阀", phonetic:"/vælv/" }
]
},

{
text:"Screw",
phonetic:"/skruː/",
cn:"螺钉",

},

{
text:"Hydraulic Oil Tank",
phonetic:"/haɪˈdrɔːlɪk ɔɪl tæŋk/",
cn:"油箱本体",
desc:"储存液压油的主体结构",
words:[
{ w:"Hydraulic", cn:"液压", phonetic:"/haɪˈdrɔːlɪk/" },
{ w:"Oil", cn:"油", phonetic:"/ɔɪl/" },
{ w:"Tank", cn:"油箱", phonetic:"/tæŋk/" }
]
},

{
text:"Plug",
phonetic:"/plʌɡ/",
cn:"堵头",
desc:"用于封闭孔口或接口"
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
