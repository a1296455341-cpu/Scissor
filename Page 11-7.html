<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control & Structure Module</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Programmable Controller",
phonetic:"/ˈproʊɡræməbl kənˈtroʊlər/",
cn:"可编程控制器",
desc:"用于工业自动化逻辑控制的电子控制设备",
words:[
{ w:"Programmable", cn:"可编程的", phonetic:"/ˈproʊɡræməbl/" },
{ w:"Controller", cn:"控制器", phonetic:"/kənˈtroʊlər/" }
]
},

{
text:"Bracket",
phonetic:"/ˈbrækɪt/",
cn:"支架",
desc:"用于结构支撑与固定的零件",
words:[
{ w:"Bracket", cn:"支架", phonetic:"/ˈbrækɪt/" }
]
},

{
text:"Washer",
phonetic:"/ˈwɑːʃər/",
cn:"垫圈",
desc:"用于螺栓连接中分散压力的零件",
words:[
{ w:"Washer", cn:"垫圈", phonetic:"/ˈwɑːʃər/" }
]
},

{
text:"Screw",
phonetic:"/skruː/",
cn:"螺钉",
desc:"用于旋入固定的紧固件",
words:[
{ w:"Screw", cn:"螺钉", phonetic:"/skruː/" }
]
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
