<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Valve & Hose Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Single Hose Clamp",
phonetic:"/ˈsɪŋɡl hoʊz klæmp/",
cn:"单管夹",
desc:"用于固定单根液压软管",
words:[
{ w:"Single", cn:"单个", phonetic:"/ˈsɪŋɡl/" },
{ w:"Hose", cn:"软管", phonetic:"/hoʊz/" },
{ w:"Clamp", cn:"夹具", phonetic:"/klæmp/" }
]
},

{
text:"Clamping Plate",
phonetic:"/ˈklæmpɪŋ pleɪt/",
cn:"压板",
desc:"用于压紧或固定部件的板件",
words:[
{ w:"Clamping", cn:"压紧", phonetic:"/ˈklæmpɪŋ/" },
{ w:"Plate", cn:"板", phonetic:"/pleɪt/" }
]
},

{
text:"Bolt",
phonetic:"/boʊlt/",
cn:"螺栓",
desc:"标准紧固件"
},

{
text:"Gear Sector Shaft",
phonetic:"/ɡɪr ˈsɛktər ʃæft/",
cn:"选档软轴",
desc:"用于档位选择传动的轴类部件",
words:[
{ w:"Gear", cn:"齿轮/档位", phonetic:"/ɡɪr/" },
{ w:"Sector", cn:"扇形/分段", phonetic:"/ˈsɛktər/" },
{ w:"Shaft", cn:"轴", phonetic:"/ʃæft/" }
]
},

{
text:"Lower Valve Block Guard",
phonetic:"/ˈloʊər vælv blɑːk ɡɑːrd/",
cn:"下阀块护罩",
desc:"用于保护下部液压阀块",
words:[
{ w:"Lower", cn:"下部", phonetic:"/ˈloʊər/" },
{ w:"Valve", cn:"阀", phonetic:"/vælv/" },
{ w:"Block", cn:"块", phonetic:"/blɑːk/" },
{ w:"Guard", cn:"护罩", phonetic:"/ɡɑːrd/" }
]
},

{
text:"Screw",
phonetic:"/skruː/",
cn:"螺钉",
desc:"用于连接固定的紧固件"
},

{
text:"End Straight Fitting",
phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
cn:"端直通接头",
desc:"用于管路端部直通连接",
words:[
{ w:"End", cn:"端部", phonetic:"/ɛnd/" },
{ w:"Straight", cn:"直通", phonetic:"/streɪt/" },
{ w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/" }
]
},

{
text:"Hose Assembly",
phonetic:"/hoʊz əˈsɛmbli/",
cn:"胶管总成",
desc:"由软管及接头组成的组件",
words:[
{ w:"Hose", cn:"软管", phonetic:"/hoʊz/" },
{ w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/" }
]
},

{
text:"Washer",
phonetic:"/ˈwɑːʃər/",
cn:"垫圈",
desc:"用于分散载荷或防松"
},

{
text:"Lower Lift Cylinder Valve Block",
phonetic:"/ˈloʊər lɪft ˈsɪlɪndər vælv blɑːk/",
cn:"下举升油缸阀块",
desc:"控制下举升油缸的液压阀组",
words:[
{ w:"Lower", cn:"下", phonetic:"/ˈloʊər/" },
{ w:"Lift", cn:"举升", phonetic:"/lɪft/" },
{ w:"Cylinder", cn:"油缸", phonetic:"/ˈsɪlɪndər/" },
{ w:"Valve", cn:"阀", phonetic:"/vælv/" },
{ w:"Block", cn:"阀块", phonetic:"/blɑːk/" }
]
},

{
text:"Spring",
phonetic:"/sprɪŋ/",
cn:"弹簧",
desc:"用于提供弹性力"
},

{
text:"Upper Lift Cylinder Valve Block",
phonetic:"/ˈʌpər lɪft ˈsɪlɪndər vælv blɑːk/",
cn:"上举升油缸阀块",
desc:"控制上举升油缸的液压阀组",
words:[
{ w:"Upper", cn:"上", phonetic:"/ˈʌpər/" },
{ w:"Lift", cn:"举升", phonetic:"/lɪft/" },
{ w:"Cylinder", cn:"油缸", phonetic:"/ˈsɪlɪndər/" },
{ w:"Valve", cn:"阀", phonetic:"/vælv/" },
{ w:"Block", cn:"阀块", phonetic:"/blɑːk/" }
]
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
