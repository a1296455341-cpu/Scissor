<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Parts</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Shim",
phonetic:"/ʃɪm/",
cn:"调整垫片",
desc:"用于间隙调整的薄垫片"
},

{
text:"Platform Wear Pad",
phonetic:"/ˈplætˌfɔːrm wer pæd/",
cn:"平台滑块",
desc:"用于平台滑动或耐磨支撑",
words:[
{ w:"Platform", cn:"平台", phonetic:"/ˈplætˌfɔːrm/" },
{ w:"Wear", cn:"耐磨", phonetic:"/wer/" },
{ w:"Pad", cn:"滑块", phonetic:"/pæd/" }
]
},

{
text:"Bushing",
phonetic:"/ˈbʊʃɪŋ/",
cn:"轴套",
desc:"用于轴与孔之间的衬套结构"
},

{
text:"Platform Keeper Pin",
phonetic:"/ˈplætˌfɔːrm ˈkiːpər pɪn/",
cn:"平台销轴",
desc:"用于平台结构限位或固定的销轴",
words:[
{ w:"Platform", cn:"平台", phonetic:"/ˈplætˌfɔːrm/" },
{ w:"Keeper", cn:"固定", phonetic:"/ˈkiːpər/" },
{ w:"Pin", cn:"销轴", phonetic:"/pɪn/" }
]
},

{
text:"Nut",
phonetic:"/nʌt/",
cn:"螺母",
desc:"与螺栓配合使用的紧固件"
},

{
text:"Bolt",
phonetic:"/boʊlt/",
cn:"螺栓",
desc:"用于连接零件的紧固件"
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
