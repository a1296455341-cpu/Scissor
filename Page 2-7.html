<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bearing Parts</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Roller Bearing",
phonetic:"/ˈroʊlər ˈbeərɪŋ/",
cn:"滚动轴承",
desc:"通过滚动体减少摩擦的轴承",
words:[
{ w:"Roller", cn:"滚动体", phonetic:"/ˈroʊlər/" },
{ w:"Bearing", cn:"轴承", phonetic:"/ˈbeərɪŋ/" }
]
},

{
text:"Retainer Ring",
phonetic:"/rɪˈteɪnər rɪŋ/",
cn:"挡圈",
desc:"用于固定零件位置的卡环",
words:[
{ w:"Retainer", cn:"保持件", phonetic:"/rɪˈteɪnər/" },
{ w:"Ring", cn:"环", phonetic:"/rɪŋ/" }
]
},

{
text:"Roller",
phonetic:"/ˈroʊlər/",
cn:"滚轮",
desc:"用于支撑或滚动运动的圆柱体零件"
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
