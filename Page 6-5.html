<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pothole Pusher Sleeve Assembly</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Pothole Pusher Sleeve Weldment",
phonetic:"/ˈpɑːthoʊl ˈpʊʃər sliːv ˈwɛldmənt/",
cn:"压轴筒焊合",
desc:"用于坑洞推杆机构的导向套筒焊接结构",
words:[
{ w:"Pothole", cn:"坑洞", phonetic:"/ˈpɑːthoʊl/" },
{ w:"Pusher", cn:"推杆", phonetic:"/ˈpʊʃər/" },
{ w:"Sleeve", cn:"套筒", phonetic:"/sliːv/" },
{ w:"Weldment", cn:"焊合件", phonetic:"/ˈwɛldmənt/" }
]
},

{
text:"Spring",
phonetic:"/sprɪŋ/",
cn:"弹簧",
desc:"用于提供弹性恢复力的元件"
},

{
text:"Pothole Pusher",
phonetic:"/ˈpɑːthoʊl ˈpʊʃər/",
cn:"压轴",
desc:"用于坑洞机构的推动执行件",
words:[
{ w:"Pothole", cn:"坑洞", phonetic:"/ˈpɑːthoʊl/" },
{ w:"Pusher", cn:"推杆", phonetic:"/ˈpʊʃər/" }
]
},

{
text:"Bushing",
phonetic:"/ˈbʊʃɪŋ/",
cn:"轴套",
desc:"用于轴与孔之间减磨支撑的套筒结构"
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
