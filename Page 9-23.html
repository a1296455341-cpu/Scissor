<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Hose Clamps & Mounting</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Bolt",
phonetic:"/boʊlt/",
cn:"螺栓",
desc:"用于连接和固定结构件的标准紧固件"
},

{
text:"Clamping Plate",
phonetic:"/ˈklæmpɪŋ pleɪt/",
cn:"压板",
desc:"用于压紧和固定管路或结构件",
words:[
{ w:"Clamping", cn:"压紧", phonetic:"/ˈklæmpɪŋ/" },
{ w:"Plate", cn:"板", phonetic:"/pleɪt/" }
]
},

{
text:"Single Hose Clamp",
phonetic:"/ˈsɪŋɡəl hoʊz klæmp/",
cn:"单管夹",
desc:"用于固定单根软管的夹具",
words:[
{ w:"Single", cn:"单个", phonetic:"/ˈsɪŋɡəl/" },
{ w:"Hose", cn:"软管", phonetic:"/hoʊz/" },
{ w:"Clamp", cn:"夹具", phonetic:"/klæmp/" }
]
},

{
text:"Hose Clamp Mounting Plate",
phonetic:"/hoʊz klæmp ˈmaʊntɪŋ pleɪt/",
cn:"管夹固定角板",
desc:"用于安装和固定管夹的支撑板",
words:[
{ w:"Hose Clamp", cn:"管夹", phonetic:"/hoʊz klæmp/" },
{ w:"Mounting", cn:"安装", phonetic:"/ˈmaʊntɪŋ/" },
{ w:"Plate", cn:"板", phonetic:"/pleɪt/" }
]
},

{
text:"Nut",
phonetic:"/nʌt/",
cn:"螺母",
desc:"与螺栓配合使用的紧固件"
},

{
text:"Hose Assembly",
phonetic:"/hoʊz əˈsɛmbli/",
cn:"胶管总成",
desc:"由软管与接头组成的液压管路组件",
words:[
{ w:"Hose", cn:"胶管", phonetic:"/hoʊz/" },
{ w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/" }
]
},

{
text:"End Straight Fitting",
phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
cn:"端直通接头",
desc:"用于管路端部直线连接的接头",
words:[
{ w:"End", cn:"端部", phonetic:"/ɛnd/" },
{ w:"Straight", cn:"直通", phonetic:"/streɪt/" },
{ w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/" }
]
},

{
text:"Screw",
phonetic:"/skruː/",
cn:"螺钉",
desc:"用于固定连接的螺纹紧固件"
},

{
text:"Chassis Hose Clamp",
phonetic:"/ˈʃæsiː hoʊz klæmp/",
cn:"底盘管夹",
desc:"用于底盘管路固定的专用夹具",
words:[
{ w:"Chassis", cn:"底盘", phonetic:"/ˈʃæsiː/" },
{ w:"Hose", cn:"管路", phonetic:"/hoʊz/" },
{ w:"Clamp", cn:"夹具", phonetic:"/klæmp/" }
]
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
