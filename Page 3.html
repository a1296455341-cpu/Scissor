<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:980px; margin:auto; }

.item {
  background:#fff;

  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);

.title { font-weight:bold; cursor:pointer; }

.desc { color:#666; font-size:14px; margin-top:6px; }

.split { margin-left:18px; margin-top:8px; }

.word {
  display:block;
  margin-top:6px;
  cursor:pointer;
}

.btn { color:#1a73e8; cursor:pointer; }

.phonetic { color:#999; font-size:13px; margin-left:6px; }
.small { color:#888; font-size:13px; margin-left:6px; }
</style>

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  speechSynthesis.speak(u);
}

function render(){
  const container = document.querySelector(".container");

  parts.forEach(p=>{
    const item = document.createElement("div");
    item.className = "item";

    let html = "";

    if(p.words){
      html = `
        <div class="split">
          ${p.words.map(w=>`
            <div class="word btn" onclick="speak('${w.w}')">
              🔊 ${w.w}
              <span class="phonetic">${w.phonetic}</span>
              <span class="small">${w.cn}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>

      <div class="desc">${p.desc}</div>

      ${html}
    `;

    container.appendChild(item);
  });
}

window.onload = render;
