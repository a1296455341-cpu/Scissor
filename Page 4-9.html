<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Tank & Hardware Parts</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Hydraulic Tank Weldment",
phonetic:"/haɪˈdrɔːlɪk tæŋk ˈwɛldmənt/",
cn:"液压箱焊合",
desc:"液压系统油箱的焊接结构总成",
words:[
{ w:"Hydraulic", cn:"液压", phonetic:"/haɪˈdrɔːlɪk/" },
{ w:"Tank", cn:"油箱", phonetic:"/tæŋk/" },
{ w:"Weldment", cn:"焊合件", phonetic:"/ˈwɛldmənt/" }
]
},

{
text:"Handle",
phonetic:"/ˈhændl/",
cn:"拉手",
desc:"用于操作或开启的手柄结构"
},

{
text:"Door Lock",
phonetic:"/dɔːr lɑːk/",
cn:"门锁",
desc:"用于门体锁止的机构",
words:[
{ w:"Door", cn:"门", phonetic:"/dɔːr/" },
{ w:"Lock", cn:"锁", phonetic:"/lɑːk/" }
]
},

{
text:"Bolt",
phonetic:"/boʊlt/",
cn:"螺栓",
desc:"标准紧固件"
},

{
text:"Washer",
phonetic:"/ˈwɑːʃər/",
cn:"垫圈",
desc:"用于分散载荷或防松"
},

{
text:"Nut",
phonetic:"/nʌt/",
cn:"螺母",
desc:"与螺栓配合使用的紧固件"
},

{
text:"Bushing",
phonetic:"/ˈbʊʃɪŋ/",
cn:"轴套",
desc:"用于轴与孔之间的减磨结构"
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
