function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  speechSynthesis.speak(u);
}

function render(){
  const container = document.querySelector(".container");

  parts.forEach(p=>{
    const item = document.createElement("div");
    item.className = "item";

    let html = "";

    if(p.words){
      html = `
        <div class="split">
          ${p.words.map(w=>`
            <div class="word btn" onclick="speak('${w.w}')">
              🔊 ${w.w}
              <span class="phonetic">${w.phonetic}</span>
              <span class="small">${w.cn}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>

      <div class="desc">${p.desc}</div>

      ${html}
    `;

    container.appendChild(item);
  });
}

window.onload = render;
