<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ladder Weldment Parts</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); margin-bottom:12px;}
.title { font-weight:bold; font-size:18px; }
.desc { color:#666; font-size:14px; margin-top:6px; }
.word { display:block; margin-left:10px; margin-top:6px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Micro Ladder Weldment",
phonetic:"/ˈmaɪkroʊ ˈlædər ˈwɛldmənt/",
cn:"梯子焊合",
desc:"用于设备上下通行的微型梯焊接结构",
words:[
{ w:"Micro", cn:"微型", phonetic:"/ˈmaɪkroʊ/" },
{ w:"Ladder", cn:"梯子", phonetic:"/ˈlædər/" },
{ w:"Weldment", cn:"焊合件", phonetic:"/ˈwɛldmənt/" }
]
},

{
text:"Washer",
phonetic:"/ˈwɑːʃər/",
cn:"垫圈",
desc:"用于分散载荷或防松结构"
},

{
text:"Bolt",
phonetic:"/boʊlt/",
cn:"螺栓",
desc:"标准结构紧固件"
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
